name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Resolve release version
        id: version
        run: |
          PROJECT_VERSION="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as handle:
              print(tomllib.load(handle)["project"]["version"])
          PY
          )"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_VERSION="${{ inputs.version }}"
            RELEASE_TAG="v${RELEASE_VERSION#v}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
            RELEASE_VERSION="${RELEASE_TAG#v}"
          fi

          if [ "$PROJECT_VERSION" != "$RELEASE_VERSION" ]; then
            echo "pyproject.toml version ($PROJECT_VERSION) does not match release version ($RELEASE_VERSION)." >&2
            exit 1
          fi

          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build source and wheel distributions
        run: python -m build

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" dist/* \
            --title "Cutie ${{ steps.version.outputs.version }}" \
            --generate-notes \
            --target "$GITHUB_SHA"
